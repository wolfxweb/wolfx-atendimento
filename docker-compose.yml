version: "3.8"

services:
  api:
    build: ./backend
    image: wolfxweb/atendimento-api:latest
    container_name: atendimento_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:***@postgres_postgres:5432/atendimento_db
      - SECRET_KEY=***
      - DEBUG=false
      - MINIMAX_API_KEY=${MINI...KEY}
      - MINIMAX_API_BASE=https://api.minimax.chat/v1
      - KB_UPLOAD_DIR=/app/uploads
      - LLM_MODEL=google/gemini-2.0-flash-exp
    volumes:
      - uploads_data:/app/uploads
    networks:
      - server
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.atendimento.rule=Host(`atendimento.wolfx.com.br`)"
        - "traefik.http.routers.atendimento.entrypoints=websecure"
        - "traefik.http.routers.atendimento.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.atendimento.loadbalancer.server.port=8000"

volumes:
  uploads_data:
    driver: local

networks:
  server:
    external: true
